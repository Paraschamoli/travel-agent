id: travel-planner-v1
name: travel-planner
version: 1.0.0
author: paras25619@gmail.com

# Description
description: |
  Generates structured, personalized travel itineraries with accommodations,
  daily activity plans, logistics recommendations, and budget breakdowns.
  Provides realistic, research-backed travel planning with feasibility validation
  and constraint-aware optimization.

# Tags and Modes
tags:
  - travel
  - itinerary
  - vacation
  - tourism
  - trip-planning
  - logistics
  - budget
  - destination-research

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "Plan a 5-day cultural trip to Kyoto for a family of 4 with a $4000 budget"
  - "Create a romantic weekend getaway in Paris under $2000"
  - "Organize a 7-day solo adventure trip to New Zealand"
  - "Design a 3-day corporate offsite in Barcelona for 20 people"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Creates comprehensive travel itineraries with structured daily plans and budget estimates"
    features:
      - "Generates multi-day structured itineraries"
      - "Provides accommodation recommendations with cost estimates"
      - "Creates daily themed activity schedules"
      - "Builds complete budget breakdowns"
      - "Includes logistics and transport guidance"
      - "Adapts plan based on budget, group size, and travel style"
    limitations: "Does not perform real-time booking, live pricing, visa processing, or transactional operations"

  secondary_capability:
    supported: true
    description: "Optimizes travel plans based on constraints and provides feasibility insights"
    features:
      - "Flags budget feasibility"
      - "Provides cost-saving alternatives"
      - "Identifies seasonal considerations"
      - "Suggests booking timelines"
      - "Adapts itinerary for group dynamics"

# Requirements
requirements:
  packages:
    - "agno"
    - "openai or openrouter"
    - "exa-py"
  system:
    - "Internet access for destination research"
  min_memory_mb: 512

# Performance Metrics
performance:
  avg_processing_time_ms: 8000
  max_concurrent_requests: 3
  memory_per_request_mb: 512
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - ExaTools
  - MultiMCPTools
  - Mem0Tools
  - Think
  - Analyze
  - Reason
  - Extract
  - ReasoningTools

# Rich Documentation
documentation:
  overview: |
    This skill generates structured travel plans with realistic cost estimation
    and logistical feasibility checks. It balances itinerary density, travel time,
    budget constraints, and traveler preferences to create coherent multi-day plans.
    Designed for orchestration-friendly JSON outputs and ecosystem consistency.

  use_cases:
    when_to_use:
      - "Planning multi-day vacations"
      - "Creating structured travel itineraries"
      - "Budget estimation for trips"
      - "Corporate retreat planning"
      - "Group travel coordination"
      - "Special occasion travel planning"

    when_not_to_use:
      - "Real-time flight or hotel booking"
      - "Visa or immigration assistance"
      - "Travel insurance purchase"
      - "Emergency travel support"
      - "Currency exchange services"
      - "Illegal or restricted travel activities"

  input_structure: |
    Accepts travel planning requests in plain text or JSON format.

    Example (Plain Text):
    "Plan a 5-day cultural trip to Kyoto for 4 people with a $4000 budget in April."

    Example (JSON):
    {
      "destination": "Kyoto, Japan",
      "duration_days": 5,
      "start_date": "2026-04-10",
      "end_date": "2026-04-15",
      "group_size": 4,
      "budget_total": 4000,
      "currency": "USD",
      "travel_style": "cultural",
      "special_requirements": ["vegetarian"]
    }

    Constraints:
    - Destination required
    - Either duration_days OR (start_date + end_date) required
    - Duration maximum: 30 days
    - Budget must be positive if provided
    - Group size must be ≥ 1
    - Minimum input length: 10 words
    - Maximum input length: ~5,000 words
    - Language: English

  output_format: |
    Returns structured travel plan with clearly defined sections.

    Output Structure:

    - TRAVEL SUMMARY:
      - DESTINATION
      - DURATION (days)
      - GROUP SIZE
      - TRAVEL STYLE
      - ESTIMATED TOTAL COST
      - BUDGET STATUS (within / optimized / exceeds)

    - ACCOMMODATIONS:
      For each option:
        - NAME
        - TYPE
        - AREA
        - ESTIMATED COST PER NIGHT
        - PROS
        - CONS

    - DAILY ITINERARY:
      For each day:
        - DAY NUMBER
        - THEME
        - ACTIVITIES:
            - TITLE
            - TIME BLOCK
            - LOCATION AREA
            - ESTIMATED COST
        - DAILY ESTIMATED COST

    - BUDGET BREAKDOWN:
      - ACCOMMODATION
      - INTERCITY TRANSPORT
      - LOCAL TRANSPORT
      - FOOD
      - ACTIVITIES
      - MISCELLANEOUS
      - TOTAL ESTIMATED

    - LOGISTICS:
      - AIRPORT TRANSFER SUGGESTION
      - TRANSPORT PASSES
      - BOOKING TIMELINE

    - LOCAL INSIGHTS:
      - BEST TIME TO VISIT
      - CULTURAL TIPS
      - SAFETY NOTES

    - ASSUMPTIONS:
      - List of planning assumptions

    - OVERALL FEASIBILITY:
      - COST CONFIDENCE (High / Medium / Low)
      - PRACTICALITY RATING (A–F scale)
      - RECOMMENDATIONS (≤ 30 words)

  error_handling:
    - "Missing destination: Returns error requesting destination"
    - "Missing duration information: Returns error requesting travel dates or duration"
    - "Duration exceeds 30 days: Returns constraint error"
    - "Budget unrealistic: Returns plan with feasibility warning"
    - "Unsupported request (booking/visa): Returns capability limitation message"
    - "Tool timeout: Retries with exponential backoff, max 3 attempts"

  examples:
    - title: "Family Cultural Trip"
      input:
        destination: "Kyoto"
        duration_days: 5
        group_size: 4
        budget_total: 4000
      output:
        travel_summary:
          destination: "Kyoto, Japan"
          duration_days: 5
          group_size: 4
          estimated_total_cost: 3850
          budget_status: "within"
        practicality_rating: "A"
        processing_time_ms: 8200

    - title: "Romantic Weekend"
      input:
        content: "Create a romantic weekend in Paris under $2000"
      output:
        travel_summary:
          destination: "Paris, France"
          duration_days: 3
          estimated_total_cost: 1900
        practicality_rating: "A"
        processing_time_ms: 7600

  best_practices:
    for_developers:
      - "Validate numeric and date inputs before processing"
      - "Ensure realistic daily activity density"
      - "Include budget transparency"
      - "Avoid over-scheduling activities"
      - "Flag assumptions clearly"

    for_orchestrators:
      - "Route structured travel queries to this skill"
      - "Use 20–30 second timeout for complex itineraries"
      - "Chain with budget optimization if cost-sensitive"
      - "Cache frequent destination research"

  installation: |
    Required packages:
    uv sync

    Environment variables:
    - OPENAI_API_KEY or OPENROUTER_API_KEY
    - EXA_API_KEY (for destination research)
    - MEM0_API_KEY (optional)

    Quick start:
    1. Clone repository
    2. Configure .env with API keys
    3. Run: uv venv --python 3.12
    4. Run: uv sync
    5. Start agent module

  versioning:
    - version: "1.0.0"
      date: "2026-01-11"
      changes: "Initial release with structured itinerary generation and budget estimation"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "travel"
    - "trip"
    - "itinerary"
    - "vacation"
    - "holiday"
    - "plan"
    - "budget"
    - "destination"
    - "group travel"
    - "corporate retreat"

  specializations:
    - domain: "travel planning"
      confidence_boost: 0.4
    - domain: "itinerary generation"
      confidence_boost: 0.3
    - domain: "budget estimation"
      confidence_boost: 0.3

  anti_patterns:
    - "book flight"
    - "buy ticket"
    - "visa application"
    - "insurance purchase"
    - "emergency assistance"

  complexity_indicators:
    simple:
      - "weekend trip"
      - "things to do in city"
    medium:
      - "5-7 day itinerary"
      - "group vacation planning"
    complex:
      - "multi-city international tour"
      - "corporate retreat logistics"
      - "accessibility-focused travel"
